name: Release StockInvoiceApp

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Publish
        run: dotnet publish .\StockInvoiceApp\StockInvoiceApp.csproj -c Release -o .\artifacts\publish

      - name: Zip publish output
        run: Compress-Archive -Path .\artifacts\publish\* -DestinationPath .\artifacts\StockInvoiceApp-${{ github.ref_name }}.zip -Force
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            artifacts/StockInvoiceApp-${{ github.ref_name }}.zip
          generate_release_notes: true
